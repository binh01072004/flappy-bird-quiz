<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Quiz Game</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div id="game-wrapper">
    <!--
    <div id="admin-panel">
        <label><input type="checkbox" id="godModeToggle"> [Admin] Bất tử</label>
    </div>
-->
    <div id="game-container">
        
        <div id="leaderboard" style="position: absolute; top: 5px; left: 5px; background: rgba(255,255,255,0.85); padding: 5px; border-radius: 8px; z-index: 10; width: 100px;">
            <h3 style="margin: 0 0 5px 0; color: #d35400; font-size: 10px;">🏆 Top Học Bá</h3>
            <ol id="top-players-list" style="margin: 0; padding-left: 15px; font-size: 11px; color: #333; font-weight: bold;">
                <li>Đang tải...</li>
            </ol>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="start-screen" class="overlay active" style="background-color: #243439; color: white;">
            <h1 style="color: #ffcc00; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Nhập học</h1>
            
            <input type="text" id="player-name" placeholder="Nhập tên" style="padding: 10px; margin-bottom: 20px; border-radius: 8px; border: none; background-color: #37474f; color: white; text-align: center; font-size: 16px; width: 200px;">
            
            <p style="margin-bottom: 10px; font-size: 18px;">Chọn nhân vật đại diện:</p>
            
            <div id="character-selection">
                <span class="avatar" data-char="🐧">🐧</span>
                <span class="avatar" data-char="🐥">🐥</span>
                <span class="avatar" data-char="🐸">🐸</span>
                <span class="avatar selected" data-char="🤓">🤓</span>
                <span class="avatar" data-char="👽">👽</span>
            </div>

            <button id="btn-start" style="margin-top: 20px; padding: 12px 30px; border-radius: 8px; background-color: #78909c; color: white; border: 2px solid white; font-weight: bold; font-size: 18px; cursor: pointer;">Vào thi!</button>
        </div>

        <div id="quiz-screen" class="overlay">
            <div id="quiz-box">
                <h3 id="question-text">Câu hỏi sẽ hiện ở đây?</h3>
                <div id="answers-container"></div>
            </div>
        </div>

        <div id="game-over-screen" class="overlay">
            <h1 style="color: #e74c3c;">TẠCH MÔN!</h1>
            <h2 id="final-score">Số câu sống sót: 0</h2>
            <button id="btn-restart">Đóng học phí học lại</button>
        </div>
    </div>
</div>

<script src="game.js"></script>

</body>
</html>
